    <script type="text/babel">
      /********************************************

       ********************************************/
      // 👉 Remplace ces deux variables par les tiennes
      const SUPABASE_URL = "https://eayhqksztfhyxqhrrnkk.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVheWhxa3N6dGZoeXhxaHJybmtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjIxOTQwMzksImV4cCI6MjA3Nzc3MDAzOX0.AsWKSQDa9MDpsmvP6i4LOwBJevQfzUyImzt2_8D-o18"; // ← à remplir

      const OPENROUTESERVICE_API_KEY =
        "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6Ijc0ODM1ZTU2MzJkYjQyOGY4ZGRjNmFhMjYxN2ZhYjM3IiwiaCI6Im11cm11cjY0In0=";

      // ✅ Initialisation sécurisée du client Supabase
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      /********************************************
       *  COMPOSANT PRINCIPAL REACT
       ********************************************/
      const { useState, useEffect, useMemo, useCallback, useRef } = React;
      const lucide =
        window.lucideReact || window.LucideReact || window.lucide || {};

      const createFallbackIcon = (emoji) =>
        function FallbackIcon({ className = "", size = 24 }) {
          return (
            <span
              className={className}
              style={{ fontSize: size, lineHeight: 1 }}
              role="img"
              aria-hidden="true"
            >
              {emoji}
            </span>
          );
        };

      const TruckIcon = lucide.Truck || createFallbackIcon("🚚");
      const CalculatorIcon = lucide.Calculator || createFallbackIcon("🧮");
      const SearchIcon = lucide.Search || createFallbackIcon("🔍");
      const RouteIcon = lucide.Route || lucide.Map || createFallbackIcon("🗺️");
      const UnlockIcon = lucide.LockOpen || lucide.LogIn || createFallbackIcon("🔐");
      const LogoutIcon = lucide.LogOut || createFallbackIcon("🚪");
      const SettingsIcon = lucide.Settings || createFallbackIcon("⚙️");
      const UploadIcon = lucide.Upload || createFallbackIcon("📤");
      const SaveIcon = lucide.Save || createFallbackIcon("💾");
      const RefreshIcon = lucide.RefreshCcw || createFallbackIcon("🔁");
      const DownloadIcon = lucide.Download || createFallbackIcon("📥");
      const ArrowUpDownIcon = lucide.ArrowUpDown || createFallbackIcon("↕️");
      const UsersIcon = lucide.Users || createFallbackIcon("🧑‍🤝‍🧑");
      const TrashIcon =
        lucide.Trash2 || lucide.Trash || createFallbackIcon("🗑️");
      const MailIcon = lucide.Mail || createFallbackIcon("✉️");

      const ELOY_LOGO_URL =
        "https://upload.wikimedia.org/wikipedia/commons/b/b6/Eloy_%28entreprise%29.jpg";

      function EloyLogo({ compact = false, login = false }) {
        return (
          <div className="flex items-center justify-center">
            <img
              src={ELOY_LOGO_URL}
              alt="Logo Eloy"
              className={`shrink-0 object-contain ${
                compact ? "h-14 w-14" : login ? "h-24 w-24" : "h-28 w-28"
              }`}
            />
          </div>
        );
      }

      const ADMIN_EMAILS = ["admin@users.eloy"];
      const NON_SELECTION_REASONS = [
        "Disponibilité du transporteur",
        "Difficulté à joindre le transporteur",
        "Délais de livraison proposés trop longs",
        "Transporteur inadapté à la zone",
        "Contraintes internes / planning interne incompatible",
        "Préférence pour un autre transporteur (organisation interne)",
      ];

      const PREMIUM_TRANSPORTER_ID = 4;
      const PREMIUM_RATE_MULTIPLIER = 1.04;

      const sanitizeUsername = (username) => {
        if (!username) return "";

        return username
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[^a-zA-Z0-9._-]+/g, "-")
          .toLowerCase()
          .replace(/-+/g, "-")
          .replace(/^-|-$/g, "");
      };

      const buildAuthEmailFromUsername = (username) => {
        const sanitized = sanitizeUsername(username);
        if (!sanitized) {
          return "";
        }
        return `${sanitized}@users.eloy`;
      };

      const normalizeDepartmentCode = (value) => {
        if (value === null || value === undefined) {
          return "";
        }
        return String(value).trim().toLowerCase();
      };

      const buildTariffKey = (transporteurId, departementId, departementCode) => {
        if (!transporteurId) return null;
        if (
          departementId !== null &&
          departementId !== undefined &&
          departementId !== ""
        ) {
          return `id:${transporteurId}-${departementId}`;
        }

        const normalizedCode = normalizeDepartmentCode(departementCode);
        if (normalizedCode) {
          return `code:${transporteurId}-${normalizedCode}`;
        }

        return null;
      };

      const parseTariff = (rawCost) => {
        if (rawCost === null || rawCost === undefined) {
          return { available: false };
        }

        if (typeof rawCost === "number") {
          if (!Number.isFinite(rawCost) || rawCost <= 0) {
            return { available: false };
          }
          return { available: true, value: rawCost };
        }

        if (typeof rawCost === "string") {
          const normalized = rawCost.replace(",", ".").trim();
          if (!normalized) {
            return { available: false };
          }
          const numericCost = Number(normalized);
          if (!Number.isFinite(numericCost) || numericCost <= 0) {
            return { available: false };
          }
          return { available: true, value: numericCost };
        }

        return { available: false };
      };

      /********************************************
       *  FONCTION: Calcul d’un itinéraire optimal
       *  (départements triés du plus proche au plus éloigné)
       ********************************************/
      function calculateOptimalRoute(selectedDeptIds, departments) {
        if (!selectedDeptIds.length) return [];
        const list = selectedDeptIds
          .map((id) => departments.find((d) => d.id === id))
          .filter(Boolean)
          .sort((a, b) => a.km - b.km);
        return list;
      }

      const buildRouteStopDescriptors = (route) => {
        const occurrences = new Map();

        return (route || []).map((dept, index) => {
          const currentOccurrence = (occurrences.get(dept.id) || 0) + 1;
          occurrences.set(dept.id, currentOccurrence);

          return {
            key: `${dept.id}-${currentOccurrence}`,
            index,
            dept,
          };
        });
      };

      /********************************************
       *  INTERFACE ADMINISTRATEUR
       ********************************************/
      function AdminDashboard({ session, onExit, onDataUpdated }) {
        const [activeTab, setActiveTab] = useState("tarifs");
        const [adminLoading, setAdminLoading] = useState(true);
        const [adminError, setAdminError] = useState("");
        const [adminMessage, setAdminMessage] = useState("");
        const [csvError, setCsvError] = useState("");
        const [isSavingTariffs, setIsSavingTariffs] = useState(false);
        const [isSavingTransporters, setIsSavingTransporters] = useState(false);
        const [isDeletingTransporterId, setIsDeletingTransporterId] =
          useState(null);
        const [isImporting, setIsImporting] = useState(false);
        const [tariffRows, setTariffRows] = useState([]);
        const [expandedTransporters, setExpandedTransporters] = useState([]);
        const [transporterRows, setTransporterRows] = useState([]);
        const [transporterSourceRows, setTransporterSourceRows] = useState([]);
        const [rawDepartments, setRawDepartments] = useState([]);
        const [rawTransporters, setRawTransporters] = useState([]);
        const [rawLogs, setRawLogs] = useState([]);
        const [isExportPanelOpen, setIsExportPanelOpen] = useState(false);
        const [selectedExportTransporters, setSelectedExportTransporters] = useState([]);
        const [selectedLogResult, setSelectedLogResult] = useState("all");
        const [selectedLogUser, setSelectedLogUser] = useState("all");
        const [selectedAnalyticsTransporter, setSelectedAnalyticsTransporter] = useState("all");
        const fileInputRef = useRef(null);

        const normalizeNumber = (value) => {
          if (value === null || value === undefined || value === "") return null;
          const normalized = String(value).replace(",", ".").trim();
          if (!normalized) return null;
          const parsed = Number(normalized);
          if (!Number.isFinite(parsed)) {
            throw new Error(`La valeur "${value}" n'est pas un nombre valide.`);
          }
          return parsed;
        };

        const formatTariffForInput = (value) => {
          if (value === null || value === undefined || value === "") {
            return "";
          }

          try {
            const parsed = normalizeNumber(value);
            if (parsed === null) {
              return "";
            }
            return String(parsed);
          } catch (error) {
            return String(value).trim();
          }
        };

        const loadAdminData = useCallback(async () => {
          try {
            setAdminLoading(true);
            setAdminError("");
            setAdminMessage("");
            setCsvError("");

            const [departmentsResult, transportersResult, tariffsResult, logsResult] = await Promise.all([
              supabase.from("departements").select("*"),
              supabase.from("transporteurs").select("*"),
              supabase.from("tarifs_transporteurs").select("*"),
              supabase.from("logs").select("*"),
            ]);

            if (departmentsResult.error) throw departmentsResult.error;
            if (transportersResult.error) throw transportersResult.error;
            if (tariffsResult.error) throw tariffsResult.error;
            if (logsResult.error) throw logsResult.error;

            const parseCoordinate = (value) => {
              if (value === null || value === undefined || value === "") {
                return null;
              }
              const numeric = Number(value);
              return Number.isFinite(numeric) ? numeric : null;
            };

            const departments = (departmentsResult.data || []).map((dept) => ({
              id: dept.id,
              code:
                dept.code ||
                dept.departement_code ||
                dept.department_code ||
                dept.code_insee ||
                "",
              name: dept.name || dept.nom || dept.libelle || "",
              km: dept.km ?? dept.distance ?? null,
              latitude:
                parseCoordinate(dept.latitude) ||
                parseCoordinate(dept.lat) ||
                parseCoordinate(dept.lat_dd) ||
                parseCoordinate(dept.coord_latitude) ||
                null,
              longitude:
                parseCoordinate(dept.longitude) ||
                parseCoordinate(dept.lon) ||
                parseCoordinate(dept.lng) ||
                parseCoordinate(dept.long) ||
                parseCoordinate(dept.long_dd) ||
                parseCoordinate(dept.coord_longitude) ||
                null,
            }));

            const transporters = (transportersResult.data || []).map((transporter) => {
              const breakOfChargeRaw =
                transporter.break_of_charge ??
                transporter.has_break_of_charge ??
                transporter.hasBreakOfCharge ??
                false;
              const breakOfChargeCostRaw =
                transporter.break_of_charge_cost ??
                transporter.breakOfChargeCost ??
                transporter.break_cost ??
                null;
              const authorizedKmRaw =
                transporter.km_autorise ??
                transporter.kmAutorise ??
                transporter.km_autorized ??
                transporter.authorized_km ??
                null;
              const kmFeeRaw =
                transporter.frais_km ??
                transporter.fraisKm ??
                transporter.cout_km ??
                transporter.coutKm ??
                null;

              return {
                id: transporter.id,
                name: transporter.nom || transporter.name || transporter.libelle || "",
                hasBreakOfCharge: Boolean(breakOfChargeRaw),
                breakOfChargeCost:
                  breakOfChargeCostRaw !== undefined && breakOfChargeCostRaw !== null
                    ? Number(breakOfChargeCostRaw)
                    : 0,
                authorizedKm:
                  authorizedKmRaw !== undefined && authorizedKmRaw !== null
                    ? Number(authorizedKmRaw)
                    : null,
                kmFee:
                  kmFeeRaw !== undefined && kmFeeRaw !== null
                    ? Number(kmFeeRaw)
                    : null,
              };
            });

            const transporterMap = new Map(
              transporters.map((item) => [item.id, item])
            );
            const departmentMap = new Map(
              departments.map((item) => [item.id, item])
            );
            const departmentCodeMap = new Map(
              departments
                .filter((item) => item.code)
                .map((item) => [
                  normalizeDepartmentCode(item.code),
                  item,
                ])
            );

            const tariffs = (tariffsResult.data || [])
              .map((row) => {
                const transporteurId =
                  row.transporteur_id ?? row.transporter_id ?? row.transporteur ?? null;
                const departementCodeRaw =
                  row.departement_code ?? row.department_code ?? row.code ?? null;
                let departementId =
                  row.departement_id ?? row.department_id ?? row.departement ?? null;

                if (!transporteurId) {
                  return null;
                }
                let transporter = null;
                if (transporteurId !== null && transporteurId !== undefined) {
                  transporter = transporterMap.get(transporteurId) || null;
                }

                let department = null;
                if (departementId !== null && departementId !== undefined) {
                  department = departmentMap.get(departementId) || null;
                }

                if (!department && departementCodeRaw) {
                  const matchedDepartment =
                    departmentCodeMap.get(
                      normalizeDepartmentCode(departementCodeRaw)
                    ) || null;
                  if (matchedDepartment) {
                    department = matchedDepartment;
                    if (
                      departementId === null ||
                      departementId === undefined ||
                      departementId === ""
                    ) {
                      departementId = matchedDepartment.id;
                    }
                  }
                }

                const departmentCodeForSave = (() => {
                  if (department?.code) {
                    return department.code.trim();
                  }
                  if (
                    typeof departementCodeRaw === "string" &&
                    departementCodeRaw.trim()
                  ) {
                    return departementCodeRaw.trim();
                  }
                  if (
                    departementCodeRaw !== null &&
                    departementCodeRaw !== undefined
                  ) {
                    return String(departementCodeRaw).trim();
                  }
                  return "";
                })();

                if (!departementId && !departmentCodeForSave) {
                  return null;
                }

                const transporterName =
                  transporter?.name || `Transporteur #${transporteurId}`;
                const departmentDisplayCode =
                  departmentCodeForSave ||
                  department?.code ||
                  (departementId ? `Dept #${departementId}` : "");
                const departmentName = department?.name || "";

                const rawTarpsCost =
                  row.prix_bache ??
                  row.prix_tarps ??
                  row.tarif_bache ??
                  row.tarif_bache_ht ??
                  "";
                const rawFlatbedCost =
                  row.prix_plateau ??
                  row.prix_flatbed ??
                  row.tarif_plateau ??
                  row.tarif_plateau_ht ??
                  "";

                const formattedTarps = formatTariffForInput(rawTarpsCost);
                const formattedFlatbed = formatTariffForInput(rawFlatbedCost);

                return {
                  transporteurId,
                  departementId:
                    departementId ?? department?.id ?? null,
                  transporterName,
                  departmentCode: departmentDisplayCode || "",
                  departmentCodeForSave: departmentCodeForSave || null,
                  departmentName,
                  tarpsCost: formattedTarps,
                  flatbedCost: formattedFlatbed,
                  originalTarpsCost: formattedTarps,
                  originalFlatbedCost: formattedFlatbed,
                  hasExistingTariff: true,
                };
              })
              .filter(Boolean);

            const existingTariffMap = new Map();
            tariffs.forEach((item) => {
              const keyById = buildTariffKey(
                item.transporteurId,
                item.departementId,
                null
              );
              if (keyById) {
                existingTariffMap.set(keyById, item);
              }

              const keyByCode = buildTariffKey(
                item.transporteurId,
                null,
                item.departmentCodeForSave || item.departmentCode
              );
              if (keyByCode) {
                existingTariffMap.set(keyByCode, item);
              }
            });

            const sortedTransporters = [...transporters].sort((a, b) => {
              const nameA = a.name || `Transporteur #${a.id}`;
              const nameB = b.name || `Transporteur #${b.id}`;
              return nameA.localeCompare(nameB, "fr", { numeric: true });
            });
            const sortedDepartments = [...departments].sort((a, b) => {
              const codeA = a.code || `Dept #${a.id}`;
              const codeB = b.code || `Dept #${b.id}`;
              return codeA.localeCompare(codeB, "fr", { numeric: true });
            });

            const completeTariffs = [];

            sortedTransporters.forEach((transporter) => {
              sortedDepartments.forEach((department) => {
                const keyById = buildTariffKey(
                  transporter.id,
                  department.id,
                  null
                );
                const keyByCode = buildTariffKey(
                  transporter.id,
                  null,
                  department.code
                );
                const existing =
                  existingTariffMap.get(keyById) ||
                  existingTariffMap.get(keyByCode);

                completeTariffs.push({
                  transporteurId: transporter.id,
                  departementId: department.id,
                  transporterName:
                    transporter.name || `Transporteur #${transporter.id}`,
                  departmentCode:
                    existing?.departmentCode ||
                    department.code ||
                    `Dept #${department.id}`,
                  departmentCodeForSave:
                    existing?.departmentCodeForSave ?? department.code ?? null,
                  departmentName: existing?.departmentName || department.name || "",
                  tarpsCost: existing?.tarpsCost ?? "",
                  flatbedCost: existing?.flatbedCost ?? "",
                  originalTarpsCost: existing?.originalTarpsCost ?? "",
                  originalFlatbedCost: existing?.originalFlatbedCost ?? "",
                  hasExistingTariff: Boolean(existing?.hasExistingTariff ?? existing),
                });
              });
            });

            setRawDepartments(departments);
            setRawTransporters(transporters);
            setRawLogs(logsResult.data || []);
            setTariffRows(completeTariffs);
            setTransporterSourceRows(transportersResult.data || []);
            setTransporterRows(
              transporters.map((item) => ({
                id: item.id,
                name: item.name,
                hasBreakOfCharge: item.hasBreakOfCharge,
                breakOfChargeCost: String(
                  item.breakOfChargeCost ?? ""
                ),
                authorizedKm: String(item.authorizedKm ?? ""),
                kmFee: String(item.kmFee ?? ""),
              }))
            );
          } catch (err) {
            console.error("❌ Erreur chargement admin :", err);
            setAdminError(
              err.message ||
                "Impossible de charger les données d'administration."
            );
          } finally {
            setAdminLoading(false);
          }
        }, [session?.user?.id]);

        useEffect(() => {
          loadAdminData();
        }, [loadAdminData]);

        const transporterMap = useMemo(
          () => new Map(rawTransporters.map((item) => [item.id, item])),
          [rawTransporters]
        );

        const departmentMap = useMemo(
          () => new Map(rawDepartments.map((item) => [item.id, item])),
          [rawDepartments]
        );

        const groupedTariffs = useMemo(() => {
          const groups = new Map();

          tariffRows.forEach((row, index) => {
            if (!groups.has(row.transporteurId)) {
              groups.set(row.transporteurId, {
                transporterId: row.transporteurId,
                transporterName:
                  row.transporterName || `Transporteur #${row.transporteurId}`,
                departments: [],
              });
            }

            const group = groups.get(row.transporteurId);
            group.departments.push({ ...row, rowIndex: index });
          });

          return Array.from(groups.values())
            .map((group) => ({
              ...group,
              departments: group.departments.sort((a, b) =>
                (a.departmentCode || "").localeCompare(
                  b.departmentCode || "",
                  "fr",
                  {
                    numeric: true,
                  }
                )
              ),
            }))
            .sort((a, b) =>
              (a.transporterName || "").localeCompare(
                b.transporterName || "",
                "fr",
                {
                  numeric: true,
                }
              )
            );
        }, [tariffRows]);


        const normalizedLogs = useMemo(() => {
          return (rawLogs || [])
            .map((log) => {
              const searchDate = log.date_recherche || log.created_at || null;
              const normalizedResult = String(log.resultat || "").trim();
              const normalizedUser = String(log.utilisateur || "").trim();

              return {
                ...log,
                searchDate,
                normalizedResult,
                normalizedUser,
              };
            })
            .sort((a, b) => {
              const aTime = a.searchDate ? new Date(a.searchDate).getTime() : 0;
              const bTime = b.searchDate ? new Date(b.searchDate).getTime() : 0;
              return bTime - aTime;
            });
        }, [rawLogs]);

        const logResultOptions = useMemo(() => {
          return Array.from(
            new Set(
              normalizedLogs
                .map((log) => log.normalizedResult)
                .filter(Boolean)
            )
          ).sort((a, b) => a.localeCompare(b, "fr", { numeric: true }));
        }, [normalizedLogs]);

        const logUserOptions = useMemo(() => {
          return Array.from(
            new Set(
              normalizedLogs
                .map((log) => log.normalizedUser)
                .filter(Boolean)
            )
          ).sort((a, b) => a.localeCompare(b, "fr", { numeric: true }));
        }, [normalizedLogs]);

        const logColumns = useMemo(() => {
          const excludedKeys = new Set(["searchDate", "normalizedResult", "normalizedUser", "id"]);
          const preferredOrder = [
            "date_recherche",
            "created_at",
            "utilisateur",
            "bordereau",
            "resultat",
            "transport_premium",
            "attributs",
            "departements",
            "difference",
          ];

          const discovered = new Set();
          normalizedLogs.forEach((log) => {
            Object.keys(log || {}).forEach((key) => {
              if (!excludedKeys.has(key)) {
                discovered.add(key);
              }
            });
          });

          const discoveredArray = Array.from(discovered);
          const preferred = preferredOrder.filter((key) => discovered.has(key));
          const others = discoveredArray
            .filter((key) => !preferred.includes(key))
            .sort((a, b) => a.localeCompare(b, "fr", { numeric: true }));

          return [...preferred, ...others];
        }, [normalizedLogs]);

        const filteredDataLogs = useMemo(() => {
          return normalizedLogs.filter((log) => {
            const matchResult =
              selectedLogResult === "all" || log.normalizedResult === selectedLogResult;
            const matchUser =
              selectedLogUser === "all" || log.normalizedUser === selectedLogUser;
            return matchResult && matchUser;
          });
        }, [normalizedLogs, selectedLogResult, selectedLogUser]);

        const analyticsTransporterOptions = useMemo(() => {
          const names = new Set();
          normalizedLogs.forEach((log) => {
            [log.resultat, log.choix_1, log.choix_2, log.choix_3].forEach((value) => {
              const name = String(value || "").trim();
              if (name) names.add(name);
            });
          });
          return Array.from(names).sort((a, b) => a.localeCompare(b, "fr", { numeric: true }));
        }, [normalizedLogs]);

        const analyticsData = useMemo(() => {
          const transporter = selectedAnalyticsTransporter;

          const normalizeReason = (value) =>
            String(value || "")
              .normalize("NFD")
              .replace(/[̀-ͯ]/g, "")
              .toLowerCase()
              .trim()
              .replace(/\s+/g, " ");

          const isIgnoredReason = (reason) => {
            const normalized = normalizeReason(reason);
            return normalized === "" || normalized === "non renseigne" || normalized === "non rensigne" || normalized === "non rensgine";
          };

          const toNumber = (value) => {
            if (value === null || value === undefined || value === "") return null;
            const parsed = Number(String(value).replace(",", "."));
            return Number.isFinite(parsed) ? parsed : null;
          };

          if (transporter === "all") {
            let totalLogs = normalizedLogs.length;
            let firstChoiceSelectedCount = 0;
            let firstChoiceNotSelectedCount = 0;
            let totalLostCostWhenChoice1Rejected = 0;
            let rejectedCostCount = 0;
            const globalReasonsMap = new Map();

            normalizedLogs.forEach((log) => {
              const result = String(log.resultat || "").trim();
              const choice1 = String(log.choix_1 || "").trim();

              if (choice1) {
                if (choice1 === result) {
                  firstChoiceSelectedCount += 1;
                } else {
                  firstChoiceNotSelectedCount += 1;
                  const diff = toNumber(log.difference);
                  if (diff !== null) {
                    totalLostCostWhenChoice1Rejected += diff;
                    rejectedCostCount += 1;
                  }
                }
              }

              [1, 2, 3].forEach((idx) => {
                const reason = String(log[`raison_${idx}`] || "").trim();
                if (!reason || isIgnoredReason(reason)) return;
                globalReasonsMap.set(reason, (globalReasonsMap.get(reason) || 0) + 1);
              });
            });

            const sortedReasons = Array.from(globalReasonsMap.entries())
              .sort((a, b) => b[1] - a[1])
              .map(([reason, count]) => ({ reason, count }));

            return {
              selectedTransporter: "",
              totalLogs,
              inChoice1Count: 0,
              selectedCount: 0,
              selectedWhileChoice1Count: 0,
              choice1ButNotSelectedCount: firstChoiceNotSelectedCount,
              lostCostWhenChoice1Rejected: totalLostCostWhenChoice1Rejected,

              notSelectedReasons: sortedReasons,
              choice1RejectedReasons: sortedReasons,
              firstChoiceSelectedCount,
              firstChoiceNotSelectedCount,
            };
          }

          let inChoice1Count = 0;
          let selectedCount = 0;
          let selectedWhileChoice1Count = 0;
          let choice1ButNotSelectedCount = 0;
          let lostCostWhenChoice1Rejected = 0;
          let choice1RejectedCostCount = 0;

          const notSelectedReasonsMap = new Map();
          const choice1RejectedReasonsMap = new Map();

          normalizedLogs.forEach((log) => {
            const result = String(log.resultat || "").trim();
            const choice1 = String(log.choix_1 || "").trim();
            const choice2 = String(log.choix_2 || "").trim();
            const choice3 = String(log.choix_3 || "").trim();

            if (choice1 === transporter) inChoice1Count += 1;
            if (result === transporter) selectedCount += 1;
            if (choice1 === transporter && result === transporter) selectedWhileChoice1Count += 1;

            const wasProposedAndNotSelected =
              result !== transporter && [1, 2, 3].some((idx) => String(log[`choix_${idx}`] || "").trim() === transporter);

            if (wasProposedAndNotSelected) {
              [1, 2, 3].forEach((idx) => {
                const choice = String(log[`choix_${idx}`] || "").trim();
                if (choice !== transporter) return;
                const reason = String(log[`raison_${idx}`] || "").trim();
                if (!reason || isIgnoredReason(reason)) return;
                notSelectedReasonsMap.set(reason, (notSelectedReasonsMap.get(reason) || 0) + 1);
              });
            }

            if (choice1 === transporter && result !== transporter) {
              choice1ButNotSelectedCount += 1;
              const reason = String(log.raison_1 || "").trim();
              if (reason && !isIgnoredReason(reason)) {
                choice1RejectedReasonsMap.set(reason, (choice1RejectedReasonsMap.get(reason) || 0) + 1);
              }
              const diff = toNumber(log.difference);
              if (diff !== null) {
                lostCostWhenChoice1Rejected += diff;
                choice1RejectedCostCount += 1;
              }
            }
          });

          const sortEntries = (map) => Array.from(map.entries()).sort((a, b) => b[1] - a[1]);

          setAdminMessage("");

          const reader = new FileReader();
          reader.onload = () => {
            try {
              const rawText = String(reader.result || "");
              const lines = rawText
                .split(/\r?\n/)
                .map((line) => line.trim())
                .filter((line) => line.length > 0);

              if (!lines.length) {
                throw new Error("Le fichier CSV est vide.");
              }

              const delimiter = lines[0].includes(";") ? ";" : ",";
              const headers = lines[0]
                .split(delimiter)
                .map((header) => header.trim().toLowerCase());

              const getIndex = (...keys) =>
                headers.findIndex((header) => keys.includes(header));

              const transporterIdIndex = getIndex(
                "transporteur_id",
                "transporter_id",
                "transporteur"
              );
              const transporterNameIndex = getIndex(
                "transporteur_nom",
                "transporteur_name",
                "transporter_name",

              const departmentIdIndex = getIndex(

                "tarif_plateau",
                "prix_flatbed"
              );

              if (
                transporterIdIndex === -1 &&

              ) {
                throw new Error(

              if (departmentIdIndex === -1 && departmentCodeIndex === -1) {
                throw new Error(

              }

              const transporterNameToId = new Map(
                rawTransporters

                  .map((item) => [item.name.trim().toLowerCase(), item.id])
              );
              const departmentCodeToId = new Map(
                rawDepartments
                  .filter((item) => item.code)
                  .map((item) => [item.code.trim().toLowerCase(), item.id])
              );

              const importedRows = [];
              const skipped = [];

              for (let lineIndex = 1; lineIndex < lines.length; lineIndex += 1) {
                const cells = lines[lineIndex]
                  .split(delimiter)
                  .map((cell) => cell.trim());

                if (cells.length === 1 && !cells[0]) continue;

                let transporteurId = null;
                if (transporterIdIndex !== -1) {
                  const cell = cells[transporterIdIndex];
                  const parsed = Number(cell);
                  transporteurId = Number.isFinite(parsed) ? parsed : null;
                }

                if (!transporteurId && transporterNameIndex !== -1) {
                  const nameCell = cells[transporterNameIndex]?.trim().toLowerCase();
                  transporteurId = nameCell
                    ? transporterNameToId.get(nameCell) || null
                    : null;
                }

                if (!transporteurId) {
                  skipped.push({
                    line: lineIndex + 1,
                    reason: "Transporteur introuvable",
                  });
                  continue;
                }

                let departementId = null;
                let rawDepartmentCode = "";
                if (departmentIdIndex !== -1) {
                  const cell = cells[departmentIdIndex];
                  const parsed = Number(cell);
                  departementId = Number.isFinite(parsed) ? parsed : null;
                }

                if (!departementId && departmentCodeIndex !== -1) {
                  rawDepartmentCode = cells[departmentCodeIndex] || "";
                  const codeCell = rawDepartmentCode.trim().toLowerCase();
                  departementId = codeCell
                    ? departmentCodeToId.get(codeCell) || null
                    : null;
                } else if (departmentCodeIndex !== -1) {
                  rawDepartmentCode = cells[departmentCodeIndex] || "";
                }

                if (!departementId) {
                  skipped.push({
                    line: lineIndex + 1,
                    reason: "Département introuvable",
                  });
                  continue;
                }

                const tarpsValue =
                  tarpsIndex !== -1 ? formatTariffForInput(cells[tarpsIndex]) : "";
                const flatbedValue =
                  flatbedIndex !== -1
                    ? formatTariffForInput(cells[flatbedIndex])
                    : "";

                const transporter = transporterMap.get(transporteurId);
                const department = departmentMap.get(departementId);
                const departmentCodeForSave = department?.code
                  ? department.code.trim()
                  : rawDepartmentCode.trim() || null;

                importedRows.push({
                  transporteurId,
                  departementId,
                  transporterName:
                    transporter?.name || `Transporteur #${transporteurId}`,
                  departmentCode:
                    department?.code ||
                    rawDepartmentCode.trim() ||
                    `Dept #${departementId}`,
                  departmentCodeForSave: departmentCodeForSave || null,
                  departmentName: department?.name || "",
                  tarpsCost: tarpsValue,
                  flatbedCost: flatbedValue,
                });
              }

              if (!importedRows.length) {
                throw new Error(
                  "Aucune ligne valide n'a été trouvée dans le fichier CSV."
                );
              }

              setTariffRows((previous) => {
                const map = new Map();
                previous.forEach((row) => {
                  const key =
                    buildTariffKey(
                      row.transporteurId,
                      row.departementId,
                      row.departmentCodeForSave || row.departmentCode
                    ) || `${row.transporteurId}-${row.departementId}`;
                  map.set(key, row);
                });

                importedRows.forEach((row) => {
                  const key =
                    buildTariffKey(
                      row.transporteurId,
                      row.departementId,
                      row.departmentCodeForSave || row.departmentCode
                    ) || `${row.transporteurId}-${row.departementId}`;
                  const previousRow = map.get(key) || {};
                  map.set(key, {
                    ...previousRow,
                    ...row,
                    hasExistingTariff: previousRow.hasExistingTariff || false,
                    originalTarpsCost: previousRow.originalTarpsCost ?? "",
                    originalFlatbedCost: previousRow.originalFlatbedCost ?? "",
                  });
                });

                return Array.from(map.values()).sort((a, b) => {
                  if (a.transporterName === b.transporterName) {
                    return a.departmentCode.localeCompare(
                      b.departmentCode,
                      "fr",
                      { numeric: true }
                    );
                  }
                  return a.transporterName.localeCompare(
                    b.transporterName,
                    "fr",
                    { numeric: true }
                  );
                });
              });

              const successMessage = `${importedRows.length} ligne${
                importedRows.length > 1 ? "s" : ""
              } importée${importedRows.length > 1 ? "s" : ""}.`;
              setAdminMessage(successMessage);

              if (skipped.length) {
                const detail = skipped
                  .map((item) => `Ligne ${item.line} : ${item.reason}`)
                  .join(" | ");
                setCsvError(
                  `Certaines lignes ont été ignorées lors de l'import : ${detail}.`
                );
              }
            } catch (err) {
              console.error("❌ Erreur import CSV :", err);
              setCsvError(err.message || "Import CSV impossible.");
            } finally {
              setIsImporting(false);
              if (fileInputRef.current) {
                fileInputRef.current.value = "";
              }
            }
          };

      /********************************************

      function TransportOptimizer() {

        const [searchHistory, setSearchHistory] = useState([]);
        const [activeSearchId, setActiveSearchId] = useState(null);
        const [currentResults, setCurrentResults] = useState([]);
        const [logsLoading, setLogsLoading] = useState(false);
        const [logsError, setLogsError] = useState("");
        const [showAllLogs, setShowAllLogs] = useState(false);
        const [logSearch, setLogSearch] = useState("");
        const [historyFilter, setHistoryFilter] = useState("all");
        const [isSearching, setIsSearching] = useState(false);
        const [isSavingLog, setIsSavingLog] = useState(false);

        const [selectedResultIndex, setSelectedResultIndex] = useState(null);
        const [reasons, setReasons] = useState({});
        const [validationError, setValidationError] = useState("");
        const [validationMessage, setValidationMessage] = useState("");
        const [copyEmailMessage, setCopyEmailMessage] = useState("");
        const [pendingDeleteSearchId, setPendingDeleteSearchId] = useState(null);
        const [routeMetrics, setRouteMetrics] = useState({
          totalDistanceKm: 0,

        });

        const resultsRef = useRef(null);

        const [dataReloadFlag, setDataReloadFlag] = useState(0);
        const [adminPanelActive, setAdminPanelActive] = useState(false);

        const [isRegistering, setIsRegistering] = useState(false);

        const [registerError, setRegisterError] = useState("");
        const [registerMessage, setRegisterMessage] = useState("");
        const [isCreatingAccount, setIsCreatingAccount] = useState(false);
        const [isLoginPasswordVisible, setIsLoginPasswordVisible] = useState(false);
        const [isRegisterPasswordVisible, setIsRegisterPasswordVisible] = useState(false);

        const LOCAL_HISTORY_STORAGE_KEY = "transport-optimizer:search-history";

        const generateLocalId = () => {
          if (typeof crypto !== "undefined" && crypto.randomUUID) {
            return crypto.randomUUID();
          }

          return `local-${Date.now()}-${Math.random().toString(16).slice(2)}`;
        };

        const buildResultsSnapshot = (results) =>
          (results || []).map((result) => ({
            transporter: {
              id: result.transporter?.id,
              name: result.transporter?.name || "",
            },
            totalCost: Number(result.totalCost) || 0,
            details: Array.isArray(result.details) ? [...result.details] : [],
          }));

        const buildAttributesLabel = (type) => {
          if (type === "bache") return "Camion baché";
          if (type === "plateau") return "Camion plateau";
          return "Type non spécifié";
        };

        const buildEmailContent = (transporterName) => {
          const recipient = transporterName || "Transporteur";
          const deliveryDepartments = (activeRoute.length
            ? activeRoute
            : selectedDepartmentList
          ).map((dept, index) => `${index + 1}. ${dept.code} - ${dept.name}`);

          const bodyLines = [
            `Bonjour ${recipient},`,
            "",
            bordereau
              ? `Nous souhaitons organiser le transport pour la commande ${bordereau}.`
              : "Nous souhaitons organiser un transport (référence commande à préciser).",
            `Type de camion : ${buildAttributesLabel(truckType)}.`,

          if (isPremium) {
            bodyLines.push("Transport premium : Oui.");

          if (loadingDate) {
            bodyLines.push(`Date de chargement : ${loadingDate}.`);
          }

          if (deliveryDate) {
            bodyLines.push(`Date de livraison : ${deliveryDate}.`);

          const deliveryScheduleLines = formatDeliveryScheduleForEmail();
          if (deliveryScheduleLines.length) {
            bodyLines.push(...deliveryScheduleLines);

          if (!isPremium && deliveryDepartments.length) {
            bodyLines.push("Départements à livrer :", ...deliveryDepartments);

          bodyLines.push(
            "",
            "Pouvez-vous confirmer la prise en charge et le tarif associé ?",

          return {
            body: bodyLines.join("\n"),
          };
        };

        const handleCopyEmail = async (transporterName) => {
          const { body } = buildEmailContent(transporterName);
          const emailText = body;
          const setMessage = (message) => {
            setCopyEmailMessage(message);
            setTimeout(() => setCopyEmailMessage(""), 4000);
          };

          try {
            if (navigator?.clipboard?.writeText) {
              await navigator.clipboard.writeText(emailText);
              setMessage("Email copié dans le presse-papiers.");
              return;
            }
            throw new Error("Clipboard API non disponible");
          } catch (err) {
            try {
              const textarea = document.createElement("textarea");
              textarea.value = emailText;
              textarea.setAttribute("readonly", "");
              textarea.style.position = "absolute";
              textarea.style.left = "-9999px";
              document.body.appendChild(textarea);
              textarea.select();
              textarea.setSelectionRange(0, emailText.length);
              const success = document.execCommand("copy");
              document.body.removeChild(textarea);

              if (success) {
                setMessage("Email copié dans le presse-papiers.");
              } else {
                setMessage("Impossible de copier l'email. Merci de copier manuellement.");
              }
            } catch (copyErr) {
              console.error("❌ Erreur lors de la copie de l'email :", copyErr);
              setMessage("Impossible de copier l'email. Merci de copier manuellement.");
            }
          }
        };

        const parseDateValue = (value) => {
          if (!value) return 0;
          try {
            return new Date(value).getTime();
          } catch (err) {
            return 0;
          }
        };

        const sortHistoryEntries = (entries) => {
          return [...entries].sort((a, b) => {
            const dateA = parseDateValue(a.createdAt);
            const dateB = parseDateValue(b.createdAt);

            if (dateA !== dateB) {
              return dateB - dateA;
            }

            return (b.supabaseId ? 1 : 0) - (a.supabaseId ? 1 : 0);
          });
        };

        const formatDepartmentsList = (deptIds) =>
          (deptIds || [])
            .map((deptId) =>
              departments.find((dept) => dept.id === deptId)
            )
            .filter(Boolean)
            .map((dept) => `${dept.code} - ${dept.name}`)
            .join(", ");

        const formatDeliveryScheduleForEmail = () => {
          if (!isPremium) {
            return deliveryTime ? [`Horaire de livraison : ${deliveryTime}.`] : [];
          }

          if (!routeStops.length) {
            return [];
          }

          const lines = ["Horaires de livraison par arrêt :"];
          routeStops.forEach((stop, index) => {
            const slot = deliveryScheduleByStop[stop.key] || "À définir";
            lines.push(
              `${index + 1}. ${stop.dept.code} - ${stop.dept.name} : ${slot}`
            );
          });
          return lines;
        };

        useEffect(() => {
          if (typeof localStorage === "undefined") return;

          try {
            const storedHistory = localStorage.getItem(LOCAL_HISTORY_STORAGE_KEY);
            if (!storedHistory) return;

            const parsedHistory = JSON.parse(storedHistory);
            if (!Array.isArray(parsedHistory)) return;

            setSearchHistory((prev) =>
              sortHistoryEntries([...prev, ...parsedHistory])
            );
          } catch (err) {
            console.error("❌ Erreur chargement historique local :", err);
          }
        }, []);

        useEffect(() => {
          if (typeof localStorage === "undefined") return;

          const localEntries = searchHistory.filter((entry) => !entry.supabaseId);

          try {
            localStorage.setItem(
              LOCAL_HISTORY_STORAGE_KEY,
              JSON.stringify(localEntries)
            );
          } catch (err) {
            console.error("❌ Erreur sauvegarde historique local :", err);
          }
        }, [searchHistory]);

        const handleDataRefresh = useCallback(() => {
          setDataReloadFlag((value) => value + 1);
        }, []);

        const DYNAMICS_ORDER_REGEX = /^FR-(20\d{2})-\d{5}$/;
        const DELIVERY_TIME_REGEX = /^([01]\d|2[0-3]):(00|15|30|45)$/;

        const premiumHours = useMemo(
          () =>
            Array.from({ length: 24 }, (_, hour) =>
              String(hour).padStart(2, "0")
            ),
          []
        );
        const premiumMinutes = ["00", "15", "30", "45"];

        const [premiumHour, setPremiumHour] = useState("");
        const [premiumMinute, setPremiumMinute] = useState("00");

        const computeNextDay = (dateString) => {
          const parsedDate = new Date(dateString);
          if (Number.isNaN(parsedDate)) return "";

          parsedDate.setDate(parsedDate.getDate() + 1);
          return parsedDate.toISOString().slice(0, 10);
        };

        const computePreviousDay = (dateString) => {
          const parsedDate = new Date(dateString);
          if (Number.isNaN(parsedDate)) return "";

          parsedDate.setDate(parsedDate.getDate() - 1);
          return parsedDate.toISOString().slice(0, 10);
        };

        useEffect(() => {
          if (selectedDepts.length !== 2) {
            setIsRouteReversed(false);
          }
        }, [selectedDepts]);

        useEffect(() => {
          if (loadingDate && !deliveryDate) {
            setDeliveryDate(computeNextDay(loadingDate));
          }
        }, [loadingDate, deliveryDate]);

        useEffect(() => {
          if (deliveryDate && !loadingDate) {
            setLoadingDate(computePreviousDay(deliveryDate));
          }
        }, [deliveryDate, loadingDate]);

        useEffect(() => {
          if (DELIVERY_TIME_REGEX.test(deliveryTime)) {
            const [hour, minute] = deliveryTime.split(":");
            setPremiumHour(hour);
            setPremiumMinute(minute);
            return;
          }

          setPremiumHour("");
          setPremiumMinute("00");
        }, [deliveryTime]);

          if (!isPremium) {
            setDeliveryScheduleByStop({});
          }

          setDeliveryTime((previous) => {

              return DELIVERY_TIME_REGEX.test(previous) ? previous : "";

            if (previous === "matin" || previous === "soir") {
              return previous;

            return "matin";
          });

        const userIdentifier = session?.user?.id || session?.user?.email || null;
        const userDisplayName =

          session?.user?.user_metadata?.full_name ||
          session?.user?.email ||

        const isAdmin = ADMIN_EMAILS.includes(userEmail);

        const fetchLogs = useCallback(async () => {

            setSearchHistory((prev) => prev.filter((entry) => !entry.supabaseId));
            setLogsError("");
            return;

          try {
            setLogsLoading(true);
            setLogsError("");
            const { data, error } = await supabase
              .from("logs")
              .select("*")
              .eq("identifiant", userIdentifier)
              .order("date_recherche", { ascending: false });

            if (error) throw error;

            setSearchHistory((prev) => {
              const nonSupabaseEntries = prev.filter((entry) => !entry.supabaseId);
              const supabaseEntries = (data || []).map(transformLogToHistoryEntry);
              return sortHistoryEntries([...nonSupabaseEntries, ...supabaseEntries]);
            });
          } catch (err) {
            console.error("❌ Erreur récupération logs :", err);
            setLogsError(err.message || "Impossible de récupérer l'historique.");

            setLogsLoading(false);
          }

        /********************************************
         *  CHARGEMENT DES DONNÉES SUPABASE
         ********************************************/
        useEffect(() => {
          let isMounted = true;

          async function initAuth() {
            try {
              setAuthError("");
              const {
                data: { session },
                error,
              } = await supabase.auth.getSession();
              if (error) throw error;
              if (isMounted) setSession(session);
            } catch (err) {
              console.error("❌ Erreur d'authentification :", err);
              if (isMounted)
                setAuthError(err.message || "Impossible de vérifier la session Supabase.");
            } finally {
              if (isMounted) setAuthLoading(false);
            }
          }

          const {
            data: { subscription },
          } = supabase.auth.onAuthStateChange((_event, session) => {
            if (isMounted) {
              setSession(session);
            }
          });

          initAuth();

          return () => {
            isMounted = false;
            subscription.unsubscribe();
          };
        }, []);

        useEffect(() => {
          if (!session) {
            setDepartments([]);
            setTransporters([]);
            setLoading(false);

          async function loadData() {
            try {
              setLoading(true);
