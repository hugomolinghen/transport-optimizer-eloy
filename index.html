              const [departmentsResult, transportersResult, tariffsResult] =
                await Promise.all([
                  supabase.from("departements").select("*"),
                  supabase.from("transporteurs").select("*"),
                  supabase.from("tarifs_transporteurs").select("*"),
                ]);

              if (departmentsResult.error) throw departmentsResult.error;
              if (transportersResult.error) throw transportersResult.error;
              if (tariffsResult.error) throw tariffsResult.error;

              const deptMap = new Map();
              (departmentsResult.data || []).forEach((dept) => {
                const code =
                  dept.code ||
                  dept.departement_code ||
                  dept.department_code ||
                  dept.code_insee ||
                  "";

                if (!code) {
                  return;
                }

                const latitudeRaw =
                  dept.latitude ??
                  dept.lat ??
                  dept.lat_geographique ??
                  dept.lat_geo ??
                  null;
                const longitudeRaw =
                  dept.longitude ??
                  dept.long ??
                  dept.lng ??
                  dept.lon ??
                  dept.long_geographique ??
                  dept.long_geo ??
                  null;

                const latitude = Number(latitudeRaw);
                const longitude = Number(longitudeRaw);

                if (!deptMap.has(code)) {
                  deptMap.set(code, {
                    id: dept.id ?? code,
                    code,
                    name: dept.name || dept.nom || dept.libelle || "",
                    km: dept.km ?? dept.distance ?? null,
                    latitude: Number.isFinite(latitude) ? latitude : null,
                    longitude: Number.isFinite(longitude) ? longitude : null,
                  });
                }
              });

              if (!deptMap.size) {
                if (!isActive) return;
                setError(
                  "Aucun département disponible. Merci de vérifier les données Supabase.",
                );
                setDepartments([]);
                setTransporters([]);
                return;
              }

              const deptList = Array.from(deptMap.values()).sort((a, b) =>
                a.code.localeCompare(b.code, "fr", { numeric: true })
              );

              const transportersMap = new Map();
              (transportersResult.data || []).forEach((transporter) => {
                const breakOfChargeRaw =
                  transporter.break_of_charge ??
                  transporter.has_break_of_charge ??
                  transporter.hasBreakOfCharge ??
                  false;
                const breakOfChargeCostRaw =
                  transporter.break_of_charge_cost ??
                  transporter.breakOfChargeCost ??
                  transporter.break_cost ??
                  null;
                const authorizedKmRaw =
                  transporter.km_autorise ??
                  transporter.kmAutorise ??
                  transporter.km_autorized ??
                  transporter.authorized_km ??
                  null;
                const kmFeeRaw =
                  transporter.frais_km ??
                  transporter.fraisKm ??
                  transporter.cout_km ??
                  transporter.coutKm ??
                  null;

                transportersMap.set(transporter.id, {
                  id: transporter.id,
                  name:
                    transporter.nom ||
                    transporter.name ||
                    transporter.libelle ||
                    "",
                  hasBreakOfCharge: Boolean(breakOfChargeRaw),
                  breakOfChargeCost:
                    breakOfChargeCostRaw !== undefined &&
                    breakOfChargeCostRaw !== null
                      ? Number(breakOfChargeCostRaw)
                      : 0,
                  authorizedKm:
                    authorizedKmRaw !== undefined && authorizedKmRaw !== null
                      ? Number(authorizedKmRaw)
                      : null,
                  kmFee:
                    kmFeeRaw !== undefined && kmFeeRaw !== null
                      ? Number(kmFeeRaw)
                      : 0,
                  rates: [],
                });
              });

              (tariffsResult.data || []).forEach((tariff) => {
                const transporter = transportersMap.get(tariff.transporteur_id);
                if (!transporter) {
                  return;
                }

                const deptCode =
                  tariff.departement_code || tariff.department_code || "";
                const dept = deptMap.get(deptCode);

                if (!dept) {
                  return;
                }

                transporter.rates.push({
                  deptId: dept.id,
                  departmentCode: dept.code,
                  kmFromSprimont: dept.km,
                  tarpsCost: tariff.prix_bache,
                  flatbedCost: tariff.prix_plateau,
                });
              });

              if (!isActive) return;

              setDepartments(deptList);
              setTransporters(Array.from(transportersMap.values()));
            } catch (err) {
              console.error("❌ Erreur Supabase :", err);
              if (isActive) setError(err.message || "Erreur inconnue");
            } finally {
              if (isActive) setLoading(false);
            }
          }

          loadData();

          return () => {
            isActive = false;
          };
        }, [session, dataReloadFlag]);

        /********************************************
         *  CALCUL DU MEILLEUR TRANSPORTEUR
         ********************************************/
        const optimalRoute = useMemo(
          () => calculateOptimalRoute(selectedDepts, departments),
          [selectedDepts, departments]
        );

        const activeRoute = useMemo(() => {
          if (isRouteReversed && optimalRoute.length === 2) {
            return [...optimalRoute].reverse();
          }
          return optimalRoute;
        }, [isRouteReversed, optimalRoute]);

        const routeStops = useMemo(
          () => buildRouteStopDescriptors(activeRoute),
          [activeRoute]
        );

        const selectedDepartmentList = useMemo(() => {
          return selectedDepts
            .map((id) => departments.find((dept) => dept.id === id))
            .filter(Boolean);
        }, [selectedDepts, departments]);


        const getDepartmentSelectionCount = useCallback(
          (deptId) => selectedDepts.filter((id) => id === deptId).length,
          [selectedDepts]
        );

        const filteredDepartments = useMemo(() => {
          const query = departmentSearch.trim().toLowerCase();

          if (!query) {
            return departments;
          }

          return departments.filter((dept) => {
            const codeMatch = dept.code?.toLowerCase().includes(query);
            const nameMatch = dept.name?.toLowerCase().includes(query);
            return codeMatch || nameMatch;
          });
        }, [departmentSearch, departments]);

        useEffect(() => {
          if (!isPremium) return;

          const validKeys = new Set(routeStops.map((stop) => stop.key));
          setDeliveryScheduleByStop((previous) => {
            const next = {};
            routeStops.forEach((stop) => {
              if (validKeys.has(stop.key) && DELIVERY_TIME_REGEX.test(previous[stop.key] || "")) {
                next[stop.key] = previous[stop.key];
              }
            });

            const unchanged =
              Object.keys(next).length === Object.keys(previous).length &&
              Object.keys(next).every((key) => next[key] === previous[key]);

            return unchanged ? previous : next;
          });
        }, [isPremium, routeStops]);

        const routeDistanceCacheRef = useRef(new Map());

        useEffect(() => {
          let isActive = true;

          const computeRouteMetrics = async () => {
            if (!activeRoute.length) {
              if (!isActive) return;
              setRouteMetrics({
                totalDistanceKm: 0,
                detourKm: 0,
                loading: false,
                error: "",
              });
              return;
            }

            if (activeRoute.length === 1) {
              const selectedDepartmentKm = Number(activeRoute[0]?.km);

              if (!isActive) return;

              setRouteMetrics({
                totalDistanceKm: Number.isFinite(selectedDepartmentKm)
                  ? selectedDepartmentKm
                  : 0,
                detourKm: 0,
                loading: false,
                error: "",
              });
              return;
            }


            const baseCoords = { lat: 50.5333, lon: 5.6203 };
            const deptCoords = activeRoute.map((dept) => {
              if (
                Number.isFinite(dept?.latitude) &&
                Number.isFinite(dept?.longitude)
              ) {
                return { lat: Number(dept.latitude), lon: Number(dept.longitude) };
              }
              return null;
            });

            if (deptCoords.some((item) => item === null)) {
              if (!isActive) return;
              setRouteMetrics({
                totalDistanceKm: 0,
                detourKm: 0,
                loading: false,
                error:
                  "Coordonnées manquantes pour au moins un département sélectionné.",
              });
              return;
            }

            const coordsList = [baseCoords, ...deptCoords];

            setRouteMetrics((prev) => ({ ...prev, loading: true, error: "" }));
            const cache = routeDistanceCacheRef.current;

            try {
              const cacheKey = coordsList
                .map((coord) => `${coord.lon},${coord.lat}`)
                .join("|");

              let distancesMatrix = cache.get(cacheKey) || null;

              if (!distancesMatrix) {
                const response = await fetch(
                  "https://api.openrouteservice.org/v2/matrix/driving-hgv",
                  {
                    method: "POST",
                    headers: {
                      Authorization: OPENROUTESERVICE_API_KEY,
                      "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                      locations: coordsList.map((coord) => [coord.lon, coord.lat]),
                      metrics: ["distance"],
                      units: "km",
                    }),
                  }
                );

                if (!response.ok) {
                  throw new Error("Impossible de calculer la matrice de distances.");
                }

                const data = await response.json();
                if (!Array.isArray(data?.distances)) {
                  throw new Error(
                    "Distance manquante dans la réponse OpenRouteService (matrix)."
                  );
                }

                distancesMatrix = data.distances;
                cache.set(cacheKey, distancesMatrix);
              }

              let segmentDistanceSum = 0;
              for (let i = 0; i < coordsList.length - 1; i += 1) {
                const segmentKm = distancesMatrix?.[i]?.[i + 1];
                if (!Number.isFinite(segmentKm)) {
                  throw new Error(
                    "Distance manquante dans la matrice pour un trajet intermédiaire."
                  );
                }
                segmentDistanceSum += segmentKm;
              }

              const directDistanceKm = distancesMatrix?.[0]?.[coordsList.length - 1];
              if (!Number.isFinite(directDistanceKm)) {
                throw new Error(
                  "Distance directe manquante dans la matrice OpenRouteService."
                );
              }

              const totalDistanceKm = segmentDistanceSum;
              let detourKm = Math.max(0, totalDistanceKm - directDistanceKm);

              if (isRouteReversed && activeRoute.length === 2) {
                const farthestDept = activeRoute.reduce((prev, curr) =>
                  curr.km > prev.km ? curr : prev
                );
                const closestDept = activeRoute.reduce((prev, curr) =>
                  curr.km < prev.km ? curr : prev
                );

                const farthestIndex =
                  1 + activeRoute.findIndex((dept) => dept.id === farthestDept.id);
                const closestIndex =
                  1 + activeRoute.findIndex((dept) => dept.id === closestDept.id);

                const betweenDistance = distancesMatrix?.[farthestIndex]?.[closestIndex];
                if (!Number.isFinite(betweenDistance)) {
                  throw new Error(
                    "Distance manquante pour le calcul du détour inversé."
                  );
                }

                detourKm = betweenDistance;
              }

              if (!isActive) return;
              setRouteMetrics({
                totalDistanceKm,
                detourKm,
                loading: false,
                error: "",
              });
            } catch (err) {
              console.error("❌ Erreur OpenRouteService :", err);
              if (!isActive) return;
              setRouteMetrics({
                totalDistanceKm: 0,
                detourKm: 0,
                loading: false,
                error:
                  err?.message ||
                  "Impossible de calculer le détour avec OpenRouteService.",
              });
            }
          };

          computeRouteMetrics();

          return () => {
            isActive = false;
          };
        }, [activeRoute, isRouteReversed]);

        const bestTransporters = useMemo(() => {
          if (!selectedDepts.length || !truckType || !transporters.length) return [];
          if (routeMetrics.loading || routeMetrics.error) return [];

          const rankedResults = [];

          const selectRateCost = (rate) => {
            const parsedTarps = parseTariff(rate.tarpsCost);
            const parsedFlatbed = parseTariff(rate.flatbedCost);

            if (truckType === "bache") {
              return {
                available: parsedTarps.available,
                value: parsedTarps.value,
                label: "baché",
              };
            }

            if (truckType === "plateau") {
              return {
                available: parsedFlatbed.available,
                value: parsedFlatbed.value,
                label: "plateau",
              };
            }

            const candidates = [];
            if (parsedTarps.available) {
              candidates.push({ value: parsedTarps.value, label: "baché" });
            }
            if (parsedFlatbed.available) {
              candidates.push({ value: parsedFlatbed.value, label: "plateau" });
            }

            if (!candidates.length) {
              return { available: false };
            }

            const bestCandidate = candidates.sort((a, b) => a.value - b.value)[0];
            return { available: true, value: bestCandidate.value, label: bestCandidate.label };
          };

          for (const transporter of transporters) {
            if (isPremium && Number(transporter.id) !== PREMIUM_TRANSPORTER_ID) {
              continue;
            }

            if (selectedDepts.length === 2 && !transporter.hasBreakOfCharge) {
              continue;
            }

            let furthestCost = null;
            let furthestDeptDetail = "";
            const details = [];
            let hasMissingTariff = false;

            for (let idx = 0; idx < activeRoute.length; idx += 1) {
              const dept = activeRoute[idx];
              const rate = transporter.rates.find((r) => r.deptId === dept.id);

              if (!rate) {
                hasMissingTariff = true;
                break;
              }

              const selectedRate = selectRateCost(rate);

              if (!selectedRate.available) {
                hasMissingTariff = true;
                break;
              }

              details.push(
                `${idx + 1}. ${dept.name} (${dept.km} km): ${selectedRate.value.toFixed(2)}€ (${selectedRate.label})`
              );

              if (furthestCost === null || selectedRate.value >= furthestCost) {
                furthestCost = selectedRate.value;
                furthestDeptDetail = `${dept.name} (${dept.km} km)`;
              }
            }

            if (hasMissingTariff || furthestCost === null) {
              continue;
            }

            if (furthestDeptDetail) {
              details.push(
                `→ Coût retenu (département le plus éloigné : ${furthestDeptDetail}) : ${furthestCost.toFixed(2)}€`
              );
            }

            if (routeMetrics.totalDistanceKm > 0) {
              details.push(
                `Trajet estimé : ${routeMetrics.totalDistanceKm.toFixed(2)} km (détour : ${routeMetrics.detourKm.toFixed(2)} km)`
              );
            }

            let totalCost = furthestCost;

            if (isPremium) {
              totalCost = furthestCost * PREMIUM_RATE_MULTIPLIER;
              details.push(
                `→ Majoration premium (${((PREMIUM_RATE_MULTIPLIER - 1) * 100).toFixed(0)}%) : ${furthestCost.toFixed(2)}€ → ${totalCost.toFixed(2)}€`
              );
            }

            if (transporter.hasBreakOfCharge) {
              const breakCost = Number(transporter.breakOfChargeCost);
              const breaksCount = Math.max(0, activeRoute.length - 1);

              if (!Number.isFinite(breakCost) || breakCost < 0) {
                continue;
              }

              if (breaksCount > 0 && breakCost > 0) {
                const totalBreakCost = breakCost * breaksCount;
                totalCost += totalBreakCost;
                details.push(
                  `+ Rupture de charge (${breaksCount} × ${breakCost.toFixed(2)}€) : ${totalBreakCost.toFixed(2)}€`
                );
              }
            }

            const kmFee = Number(transporter.kmFee);
            const authorizedDetourKmRaw = Number(transporter.authorizedKm);
            const authorizedDetourKm =
              Number.isFinite(authorizedDetourKmRaw) && authorizedDetourKmRaw > 0
                ? authorizedDetourKmRaw
                : 0;

            if (routeMetrics.detourKm > 0) {
              if (!Number.isFinite(kmFee) || kmFee < 0) {
                continue;
              }

              const billableDetourKm = Math.max(
                0,
                routeMetrics.detourKm - authorizedDetourKm
              );

              if (billableDetourKm > 0) {
                const detourCost = billableDetourKm * kmFee;
                totalCost += detourCost;
                details.push(
                  `+ Détour (${billableDetourKm.toFixed(2)} km facturés après ${authorizedDetourKm.toFixed(2)} km offerts × ${kmFee.toFixed(2)}€) : ${detourCost.toFixed(2)}€`
                );
              } else if (authorizedDetourKm > 0) {
                details.push(
                  `+ Détour : ${routeMetrics.detourKm.toFixed(2)} km (0€ car ${authorizedDetourKm.toFixed(2)} km offerts)`
                );
              }
            }

            rankedResults.push({ transporter, totalCost, details });
          }

          return rankedResults.sort((a, b) => a.totalCost - b.totalCost);
        }, [activeRoute, isPremium, routeMetrics, selectedDepts.length, transporters, truckType]);

        useEffect(() => {
          const topLength = Math.min(3, currentResults.length);

          if (
            selectedResultIndex !== null &&
            selectedResultIndex >= topLength
          ) {
            setSelectedResultIndex(null);
          }

          setReasons((prev) => {
            let changed = false;
            const next = {};

            Object.keys(prev).forEach((key) => {
              const idx = Number(key);
              if (!Number.isNaN(idx) && idx < topLength && prev[key]) {
                next[key] = prev[key];
              } else if (!changed) {
                changed = true;
              }
            });

            if (!changed) {
              const prevKeys = Object.keys(prev);
              const nextKeys = Object.keys(next);
              if (prevKeys.length !== nextKeys.length) {
                changed = true;
              }
            }

            return changed ? next : prev;
          });
        }, [currentResults, selectedResultIndex]);

        const formatTruckRate = (rawCost) => {
          const parsed = parseTariff(rawCost);
          if (!parsed.available) {
            return "Tarif indisponible";
          }
          return `${parsed.value.toFixed(2)}€`;
        };

        const formatLogDate = (value) => {
          if (!value) return "";
          try {
            return new Date(value).toLocaleString("fr-FR", {
              dateStyle: "short",
              timeStyle: "short",
            });
          } catch (err) {
            return value;
          }
        };

        const formatChoiceDisplay = (choiceName, rawCost) => {
          const trimmedName = typeof choiceName === "string" ? choiceName.trim() : "";
          const numericCost = Number(rawCost);
          const hasNumericCost = Number.isFinite(numericCost);

          if (trimmedName && hasNumericCost) {
            return `${trimmedName} (${numericCost.toFixed(2)}€)`;
          }

          if (trimmedName) {
            return trimmedName;
          }

          if (hasNumericCost) {
            return `${numericCost.toFixed(2)}€`;
          }

          return null;
        };

        const formatDifferenceValue = (difference) => {
          if (difference === null || difference === undefined) {
            return null;
          }

          const numericDifference = Number(difference);
          if (!Number.isFinite(numericDifference)) {
            return null;
          }

          return numericDifference;
        };

        const transformLogToHistoryEntry = (log) => {
          const resultsFromLog = [1, 2, 3]
            .map((idx) => {
              const choiceName = log[`choix_${idx}`];
              const costValue = Number(log[`cout_${idx}`]);
              const hasCost = Number.isFinite(costValue);

              if (!choiceName && !hasCost) {
                return null;
              }

              return {
                transporter: { name: choiceName || `Transporteur ${idx}` },
                totalCost: hasCost ? costValue : 0,
                details: [
                  hasCost
                    ? `Tarif enregistré : ${costValue.toFixed(2)}€`
                    : "Tarif indisponible dans l'historique",
                ],
              };
            })
            .filter(Boolean);

          const selectedIndex = resultsFromLog.findIndex(
            (result) =>
              result.transporter.name &&
              log.resultat &&
              result.transporter.name.toLowerCase() === log.resultat.toLowerCase()
          );

          const reasonsFromLog = {};
          ["raison_1", "raison_2", "raison_3"].forEach((key, idx) => {
            if (log[key]) {
              reasonsFromLog[idx] = log[key];
            }
          });

          const attributesRaw = (log.attributs || "").toLowerCase();
          const truckTypeFromLog = attributesRaw.includes("bach")
            ? "bache"
            : attributesRaw.includes("plateau")
            ? "plateau"
            : "non-specifie";

          const parsedSchedule = (() => {
            if (!log.horaire_livraison || typeof log.horaire_livraison !== "string") {
              return {};
            }
            try {
              const parsed = JSON.parse(log.horaire_livraison);
              return parsed && typeof parsed === "object" ? parsed : {};
            } catch (_err) {
              return {};
            }
          })();

          return {
            id: log.id ? `log-${log.id}` : generateLocalId(),
            supabaseId: log.id || null,
            bordereau: log.bordereau || "",
            isPremium: Boolean(log.transport_premium),
            loadingDate: log.date_chargement || "",
            deliveryDate: log.date_livraison || "",
            deliveryTime: log.transport_premium ? "" : log.horaire_livraison || "",
            deliveryScheduleByStop: parsedSchedule,
            selectedDepts: [],
            truckType: truckTypeFromLog,
            formattedDepartments: log.departements || "",
            attributesLabel: log.attributs || buildAttributesLabel(truckTypeFromLog),
            createdAt: log.date_recherche || log.created_at || new Date().toISOString(),
            validated: true,
            results: resultsFromLog,
            selectedResultIndex: selectedIndex >= 0 ? selectedIndex : null,
            reasons: reasonsFromLog,
            difference: formatDifferenceValue(log.difference),
          };
        };

        const sortedHistory = useMemo(
          () => sortHistoryEntries(searchHistory),
          [searchHistory]
        );

        const filteredLogs = useMemo(() => {
          const normalizedSearch = logSearch.trim().toLowerCase();
          return sortedHistory.filter((log) => {
            const matchesSearch = normalizedSearch
              ? (log.bordereau || "").toLowerCase().includes(normalizedSearch)
              : true;
            const matchesFilter =
              historyFilter === "all" ||
              (historyFilter === "validated" && log.validated) ||
              (historyFilter === "unvalidated" && !log.validated);

            return matchesSearch && matchesFilter;
          });
        }, [logSearch, sortedHistory, historyFilter]);

        const visibleLogs = useMemo(() => {
          if (showAllLogs) {
            return filteredLogs;
          }
          return filteredLogs.slice(0, 5);
        }, [filteredLogs, showAllLogs]);

        const activeSearch = useMemo(
          () => searchHistory.find((entry) => entry.id === activeSearchId) || null,
          [searchHistory, activeSearchId]
        );

        const updateActiveSearch = useCallback(
          (updater) => {
            if (!activeSearchId) return;

            setSearchHistory((prev) =>
              prev.map((entry) => {
                if (entry.id !== activeSearchId) {
                  return entry;
                }

                const updates =
                  typeof updater === "function" ? updater(entry) : updater;
                return { ...entry, ...updates };
              })
            );
          },
          [activeSearchId]
        );

        useEffect(() => {
          if (!activeSearch) return;

          setCurrentResults(activeSearch.results || []);
          setSelectedResultIndex(
            activeSearch.selectedResultIndex !== undefined
              ? activeSearch.selectedResultIndex
              : null
          );
          setReasons(activeSearch.reasons || {});
        }, [activeSearch]);

        const scrollToResults = () => {
          if (resultsRef.current) {
            resultsRef.current.scrollIntoView({ behavior: "smooth", block: "start" });
          }
        };

        const isOrderNumberValid = DYNAMICS_ORDER_REGEX.test(bordereau);
        const isLoadingDateValid = Boolean(loadingDate);
        const isDeliveryDateValid =
          Boolean(deliveryDate) &&
          (!loadingDate || new Date(deliveryDate) >= new Date(loadingDate));
        const isDeliveryTimeValid = isPremium
          ? true
          : deliveryTime === "matin" || deliveryTime === "soir";
        const arePremiumStopTimesValid = !isPremium
          ? true
          : routeStops.length > 0 &&
            routeStops.every((stop) =>
              DELIVERY_TIME_REGEX.test(deliveryScheduleByStop[stop.key] || "")
            );

        const handleSearch = () => {
          setHasSearched(true);
          setSelectedResultIndex(null);
          setReasons({});
          setValidationError("");
          setValidationMessage("");
          setIsSearching(true);

          const resultsSnapshot = buildResultsSnapshot(bestTransporters);
          const newSearch = {
            id: generateLocalId(),
            bordereau,
            selectedDepts: [...selectedDepts],
            truckType,
            isPremium,
            loadingDate,
            deliveryDate,
            deliveryTime: isPremium
              ? routeStops[0]
                ? deliveryScheduleByStop[routeStops[0].key] || ""
                : ""
              : deliveryTime,
            deliveryScheduleByStop: isPremium ? { ...deliveryScheduleByStop } : {},
            createdAt: new Date().toISOString(),
            validated: false,
            results: resultsSnapshot,
            selectedResultIndex: null,
            reasons: {},
            formattedDepartments: formatDepartmentsList(selectedDepts),
            attributesLabel: buildAttributesLabel(truckType),
          };

          setSearchHistory((prev) => sortHistoryEntries([newSearch, ...prev]));
          setActiveSearchId(newSearch.id);
          setCurrentResults(resultsSnapshot);

          setTimeout(() => {
            scrollToResults();
            setIsSearching(false);
          }, 150);
        };

        const handleHistorySelect = (entryId) => {
          const selectedEntry = searchHistory.find((entry) => entry.id === entryId);
          if (!selectedEntry) return;

          setActiveSearchId(entryId);
          setHasSearched(true);
          setSelectedDepts(selectedEntry.selectedDepts || []);
          setTruckType(selectedEntry.truckType || "non-specifie");
          setBordereau(selectedEntry.bordereau || "");
          setIsPremium(Boolean(selectedEntry.isPremium));
          setLoadingDate(selectedEntry.loadingDate || "");
          setDeliveryDate(selectedEntry.deliveryDate || "");
          setDeliveryTime(selectedEntry.deliveryTime || "");
          setDeliveryScheduleByStop(selectedEntry.deliveryScheduleByStop || {});
          setSelectedResultIndex(
            selectedEntry.selectedResultIndex !== undefined
              ? selectedEntry.selectedResultIndex
              : null
          );
          setReasons(selectedEntry.reasons || {});
          setCurrentResults(selectedEntry.results || []);

          scrollToResults();
        };

        const handleDeleteUnvalidatedSearch = async (entryId) => {
          const entry = searchHistory.find((item) => item.id === entryId);
          if (!entry || entry.validated) {
            setPendingDeleteSearchId(null);
            return;
          }

          try {
            if (entry.supabaseId) {
              const { error } = await supabase
                .from("logs")
                .delete()
                .eq("id", entry.supabaseId);

              if (error) throw error;
            }

            setSearchHistory((previous) =>
              previous.filter((item) => item.id !== entryId)
            );

            setActiveSearchId((previousActiveId) =>
              previousActiveId === entryId ? null : previousActiveId
            );
            setValidationMessage("Recherche non validée supprimée.");
            setValidationError("");
          } catch (err) {
            console.error("❌ Erreur suppression recherche non validée :", err);
            setValidationError(
              err.message || "Impossible de supprimer cette recherche pour le moment."
            );
          } finally {
            setPendingDeleteSearchId(null);
          }
        };

        const handleResultSelection = (index) => {
          setSelectedResultIndex((prev) => {
            const next = prev === index ? null : index;
            updateActiveSearch({ selectedResultIndex: next });
            return next;
          });
          setValidationError("");
          setValidationMessage("");
        };

        const handleReasonChange = (idx, value) => {
          setReasons((prev) => {
            const next = { ...prev };
            if (value) {
              next[idx] = value;
            } else {
              delete next[idx];
            }
            updateActiveSearch({ reasons: next });
            return next;
          });
          setValidationError("");
          setValidationMessage("");
        };

        const handleDepartmentSearchKeyDown = useCallback(
          (event) => {
            if (event.key !== "Enter") {
              return;
            }

            if (filteredDepartments.length !== 1) {
              return;
            }

            const soleDepartment = filteredDepartments[0];
            if (!soleDepartment) {
              return;
            }

            const inputElement = event.currentTarget;
            const alreadySelected = selectedDepts.includes(soleDepartment.id);

            event.preventDefault();
            if (!alreadySelected) {
              setSelectedDepts((prev) => {
                if (prev.includes(soleDepartment.id)) {
                  return prev;
                }

                return [...prev, soleDepartment.id];
              });
            }

            if (inputElement && typeof inputElement.select === "function") {
              requestAnimationFrame(() => {
                inputElement.select();
              });
            }
          },
          [filteredDepartments, selectedDepts]
        );

        const toggleDepartmentSelection = useCallback((deptId) => {
          setSelectedDepts((prev) => {
            const index = prev.findIndex((id) => id === deptId);
            if (index !== -1) {
              return [...prev.slice(0, index), ...prev.slice(index + 1)];
            }

            return [...prev, deptId];
          });
        }, []);

        const addDepartmentDuplicate = useCallback((deptId) => {
          setSelectedDepts((prev) => {
            const duplicateCount = prev.filter((id) => id === deptId).length;
            if (duplicateCount >= 2) {
              return prev;
            }
            return [...prev, deptId];
          });
        }, []);

        const handleValidate = async () => {
          if (!currentResults.length || !activeSearch) {
            setValidationError("Aucun résultat à valider.");
            return;
          }

          if (activeSearch.validated) {
            setValidationMessage("Cette recherche est déjà validée.");
            setValidationError("");
            return;
          }

          if (selectedResultIndex === null) {
            setValidationError("Veuillez sélectionner un transporteur.");
            return;
          }

          if (!userIdentifier) {
            setValidationError(
              "Vous devez être connecté pour enregistrer le résultat."
            );
            return;
          }

          try {
            setValidationError("");
            setValidationMessage("");
            setIsSavingLog(true);

            const formattedDepartments =
              activeSearch.formattedDepartments ||
              formatDepartmentsList(activeSearch.selectedDepts);

            const rankedChoices = (currentResults || []).slice(0, 3);
            const selectedChoice = rankedChoices[selectedResultIndex];
            const bestChoice = currentResults[0] || null;
            const differenceValue =
              bestChoice && selectedChoice
                ? Math.max(
                    0,
                    selectedChoice.totalCost - bestChoice.totalCost
                  )
                : null;

            if (!selectedChoice) {
              setValidationError("Le transporteur sélectionné est invalide.");
              setIsSavingLog(false);
              return;
            }

            const payload = {
              identifiant: userIdentifier,
              utilisateur: userDisplayName,
              bordereau,
              departements: formattedDepartments || null,
              attributs:
                activeSearch.attributesLabel ||
                buildAttributesLabel(activeSearch.truckType),
              transport_premium: Boolean(activeSearch.isPremium),
              date_chargement: activeSearch.loadingDate || null,
              date_livraison: activeSearch.deliveryDate || null,
              horaire_livraison: activeSearch.isPremium
                ? JSON.stringify(activeSearch.deliveryScheduleByStop || {})
                : activeSearch.deliveryTime || null,
              resultat: selectedChoice.transporter.name,
              choix_1: rankedChoices[0]
                ? rankedChoices[0].transporter.name
                : null,
              choix_2: rankedChoices[1]
                ? rankedChoices[1].transporter.name
                : null,
              choix_3: rankedChoices[2]
                ? rankedChoices[2].transporter.name
                : null,
              cout_1: rankedChoices[0]
                ? Number(rankedChoices[0].totalCost.toFixed(2))
                : null,
              cout_2: rankedChoices[1]
                ? Number(rankedChoices[1].totalCost.toFixed(2))
                : null,
              cout_3: rankedChoices[2]
                ? Number(rankedChoices[2].totalCost.toFixed(2))
                : null,
              difference:
                differenceValue !== null
                  ? Number(differenceValue.toFixed(2))
                  : null,
              raison_1: reasons[0] ? reasons[0].trim() || null : null,
              raison_2: reasons[1] ? reasons[1].trim() || null : null,
              raison_3: reasons[2] ? reasons[2].trim() || null : null,
            };

            const { error } = await supabase.from("logs").insert([payload]);

            if (error) {
              throw error;
            }

            setValidationMessage("Résultat enregistré avec succès.");
            updateActiveSearch({ validated: true });
          } catch (err) {
            console.error("❌ Erreur lors de l'enregistrement du log :", err);
            setValidationError(
              err.message || "Impossible d'enregistrer le résultat."
            );
          } finally {
            setIsSavingLog(false);
          }
        };

        const handleLogin = useCallback(
          async (event) => {
            event?.preventDefault();

            const trimmedIdentifier = email.trim();
            if (!trimmedIdentifier || !password) return;

            try {
              setAuthError("");

              let authEmail;
              if (trimmedIdentifier.includes("@")) {
                if (trimmedIdentifier.endsWith("@users.eloy")) {
                  authEmail = trimmedIdentifier;
                } else {
                  setAuthError(
                    "Pour vous connecter, utilisez votre nom d'utilisateur choisi lors de l'inscription."
                  );
                  return;
                }
              } else {
                authEmail = buildAuthEmailFromUsername(trimmedIdentifier);
                if (!authEmail) {
                  setAuthError("Nom d'utilisateur invalide.");
                  return;
                }
              }

              const { error } = await supabase.auth.signInWithPassword({
                email: authEmail,
                password,
              });
              if (error) throw error;
            } catch (err) {
              console.error("❌ Erreur de connexion :", err);
              setAuthError(err.message || "Impossible de se connecter.");
            }
          },
          [email, password]
        );

        const handleSignUp = useCallback(
          async (event) => {
            event?.preventDefault();
            setRegisterError("");
            setRegisterMessage("");

            const trimmedUsername = registerUsername.trim();

            if (!trimmedUsername) {
              setRegisterError(
                "Merci d'indiquer un nom d'utilisateur pour la connexion."
              );
              return;
            }

            const normalizedUsername = sanitizeUsername(trimmedUsername);
            if (!normalizedUsername) {
              setRegisterError(
                "Le nom d'utilisateur ne doit contenir que des lettres, chiffres ou caractères ._-"
              );
              return;
            }

            if (!registerPassword) {
              setRegisterError("Merci d'indiquer un mot de passe.");
              return;
            }

            const authEmail = buildAuthEmailFromUsername(trimmedUsername);
            if (!authEmail) {
              setRegisterError(
                "Impossible de générer un identifiant de connexion pour ce nom d'utilisateur."
              );
              return;
            }

            try {
              setIsCreatingAccount(true);
              const passwordValue = registerPassword;
              const { error } = await supabase.auth.signUp({
                email: authEmail,
                password: registerPassword,
                options: {
                  data: {
                    username: trimmedUsername,
                    normalized_username: normalizedUsername,
                    auth_email: authEmail,
                  },
                },
              });

              if (error) throw error;

              const identifierMessage =
                trimmedUsername === normalizedUsername
                  ? `"${trimmedUsername}"`
                  : `"${trimmedUsername}" (identifiant utilisé : "${normalizedUsername}")`;

              setRegisterMessage(
                `Compte créé avec succès ! Vous pourrez désormais vous connecter avec le nom d'utilisateur ${identifierMessage}.`
              );
              setEmail(trimmedUsername);
              setPassword(passwordValue);
              setRegisterUsername("");
              setRegisterPassword("");
              setIsRegisterPasswordVisible(false);
              setIsLoginPasswordVisible(false);
            } catch (err) {
              console.error("❌ Erreur lors de la création du compte :", err);
              const message = String(err?.message || "");
              if (
                message.toLowerCase().includes("duplicate") ||
                message.toLowerCase().includes("already")
              ) {
                setRegisterError(
                  "Ce nom d'utilisateur est déjà utilisé. Merci d'en choisir un autre."
                );
              } else {
                setRegisterError(
                  message || "Impossible de créer le compte utilisateur."
                );
              }
            } finally {
              setIsCreatingAccount(false);
            }
          },
          [registerPassword, registerUsername]
        );

        /********************************************
         *  INTERFACE UTILISATEUR
         ********************************************/
        if (authLoading)
          return (
            <div className="flex items-center justify-center h-screen text-gray-600">
              <p>Vérification de la session...</p>
            </div>
          );

        if (!session)
          return (
            <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-sky-50 to-cyan-50 p-6">
              <div className="bg-white shadow-xl rounded-2xl p-8 w-full max-w-md space-y-6">
                <div className="space-y-3">
                  <div className="flex justify-center">
                    <EloyLogo login={true} />
                  </div>
                  <div className="flex items-center gap-3">
                    <UnlockIcon className="text-sky-600" size={32} />
                    <div>
                      <h1 className="text-2xl font-bold text-gray-800">
                        {isRegistering ? "Créer un compte" : "Connexion"}
                      </h1>
                      <p className="text-sm text-gray-500">
                        {isRegistering
                          ? "Choisissez un nom d'utilisateur (utilisé pour la connexion) et un mot de passe."
                          : "Connectez-vous avec votre nom d'utilisateur et votre mot de passe pour accéder aux données transporteurs."}
                      </p>
                    </div>
                  </div>
                </div>

                {isRegistering ? (
                  <>
                    {registerError && (
                      <div className="bg-red-50 text-red-600 text-sm p-3 rounded">
                        {registerError}
                      </div>
                    )}
                    {registerMessage && (
                      <div className="bg-green-50 text-green-700 text-sm p-3 rounded">
                        {registerMessage}
                      </div>
                    )}
                    <form className="space-y-4" onSubmit={handleSignUp}>
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">
                          Nom d'utilisateur
                        </label>
                        <input
                          type="text"
                          value={registerUsername}
                          onChange={(e) => setRegisterUsername(e.target.value)}
                          className="w-full border px-3 py-2 rounded focus:ring-2 focus:ring-sky-500"
                          placeholder="Votre identifiant"
                          required
                        />
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">
                          Mot de passe
                        </label>
                        <div className="relative">
                          <input
                            type={isRegisterPasswordVisible ? "text" : "password"}
                            value={registerPassword}
                            onChange={(e) => setRegisterPassword(e.target.value)}
                            className="w-full border px-3 py-2 rounded focus:ring-2 focus:ring-sky-500 pr-12"
                            placeholder="••••••••"
                            required
                          />
                          <button
                            type="button"
                            onClick={() =>
                              setIsRegisterPasswordVisible((visible) => !visible)
                            }
                            className="absolute inset-y-0 right-0 px-3 text-sm font-medium text-sky-600 hover:text-sky-800"
                            aria-label={
                              isRegisterPasswordVisible
                                ? "Masquer le mot de passe"
                                : "Afficher le mot de passe"
                            }
                          >
                            {isRegisterPasswordVisible ? "Masquer" : "Afficher"}
                          </button>
                        </div>
                      </div>
                      <button
                        type="submit"
                        className="w-full bg-sky-600 text-white py-2 rounded hover:bg-sky-700 disabled:opacity-50"
                        disabled={isCreatingAccount}
                      >
                        {isCreatingAccount ? "Création en cours..." : "Créer le compte"}
                      </button>
                    </form>
                    <p className="text-sm text-gray-600 text-center">
                      Déjà un compte ?
                      <button
                        type="button"
                        className="text-sky-600 font-medium ml-1"
                        onClick={() => {
                          setIsRegistering(false);
                          setRegisterError("");
                          setRegisterMessage("");
                          setIsRegisterPasswordVisible(false);
                          setIsLoginPasswordVisible(false);
                        }}
                      >
                        Se connecter
                      </button>
                    </p>
                  </>
                ) : (
                  <>
                    {authError && (
                      <div className="bg-red-50 text-red-600 text-sm p-3 rounded">
                        {authError}
                      </div>
                    )}
                    <form className="space-y-4" onSubmit={handleLogin}>
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">
                          Nom d'utilisateur
                        </label>
                        <input
                          type="text"
                          value={email}
                          onChange={(e) => setEmail(e.target.value)}
                          className="w-full border px-3 py-2 rounded focus:ring-2 focus:ring-sky-500"
                          placeholder="Votre nom d'utilisateur"
                          required
                        />
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">
                          Mot de passe
                        </label>
                        <div className="relative">
                          <input
                            type={isLoginPasswordVisible ? "text" : "password"}
                            value={password}
                            onChange={(e) => setPassword(e.target.value)}
                            className="w-full border px-3 py-2 rounded focus:ring-2 focus:ring-sky-500 pr-12"
                            placeholder="••••••••"
                            required
                          />
                          <button
                            type="button"
                            onClick={() =>
                              setIsLoginPasswordVisible((visible) => !visible)
                            }
                            className="absolute inset-y-0 right-0 px-3 text-sm font-medium text-sky-600 hover:text-sky-800"
                            aria-label={
                              isLoginPasswordVisible
                                ? "Masquer le mot de passe"
                                : "Afficher le mot de passe"
                            }
                          >
                            {isLoginPasswordVisible ? "Masquer" : "Afficher"}
                          </button>
                        </div>
                      </div>
                      <button
                        type="submit"
                        className="w-full bg-sky-600 text-white py-2 rounded hover:bg-sky-700 disabled:opacity-50"
                        disabled={!email || !password}
                      >
                        Se connecter
                      </button>
                      <p className="text-xs text-gray-500 text-center">
                        Connectez-vous avec le nom d'utilisateur défini lors de la création du compte.
                      </p>
                    </form>
                    <p className="text-sm text-gray-600 text-center">
                      Pas encore de compte ?
                      <button
                        type="button"
                        className="text-sky-600 font-medium ml-1"
                        onClick={() => {
                          setIsRegistering(true);
                          setAuthError("");
                          setIsRegisterPasswordVisible(false);
                          setIsLoginPasswordVisible(false);
                        }}
                      >
                        Créer un compte
                      </button>
                    </p>
                  </>
                )}
              </div>
            </div>
          );

        if (isAdmin && adminPanelActive)
          return (
            <AdminDashboard
              session={session}
              onExit={() => setAdminPanelActive(false)}
              onDataUpdated={handleDataRefresh}
            />
          );

        if (loading)
          return (
            <div className="flex items-center justify-center h-screen text-gray-600">
              <p>Chargement des données depuis Supabase...</p>
            </div>
          );

        if (error)
          return (
            <div className="flex items-center justify-center h-screen text-red-600 text-center">
              <div>
                <p className="font-semibold mb-2">❌ Erreur :</p>
                <p>{error}</p>
              </div>
            </div>
          );

        return (
          <>
            <div className="max-w-7xl mx-auto p-6">
            {/* ======= HEADER ======= */}
            <div className="bg-white rounded-xl shadow-lg p-6 mb-8 flex items-center justify-between gap-6">
              <div className="flex items-center gap-4">
                <EloyLogo compact={true} />
                <div className="h-8 w-px bg-gray-200" aria-hidden="true" />
                <div className="flex items-center gap-3">
                  <TruckIcon className="text-sky-600" size={32} />
                  <div>
                    <h1 className="text-3xl font-bold text-gray-800">
                      Optimiseur de Transporteur
                    </h1>
                  </div>
                </div>
              </div>
              <div className="flex items-center gap-4">
                <span className="text-sm text-gray-700">{userDisplayName}</span>
                {isAdmin && (
                  <button
                    onClick={() => setAdminPanelActive(true)}
                    className="flex items-center gap-2 text-sm text-sky-600 hover:text-sky-800"
                  >
                    <SettingsIcon size={18} /> Mode admin
                  </button>
                )}
                <button
                  onClick={async () => {
                    await supabase.auth.signOut();
                  }}
                  className="flex items-center gap-2 text-sm text-gray-600 hover:text-gray-900"
                >
                  <LogoutIcon size={18} /> Déconnexion
                </button>
              </div>
            </div>

            {/* ======= FORMULAIRE CRITÈRES ======= */}
            <div className="grid md:grid-cols-3 gap-6 mb-8">
              <div className="bg-white rounded-xl shadow-lg p-6">
                <h2 className="text-lg font-semibold mb-4">Critères</h2>

                {/* Numéro de commande Dynamics */}
                <label className="block mb-1 text-sm font-medium text-gray-700">
                  Numéro de commande Dynamics <span className="text-red-600">*</span>
                </label>
                <input
                  type="text"
                  placeholder="FR-2025-00638"
                  value={bordereau}
                  onChange={(e) =>
                    setBordereau(e.target.value.trim().toUpperCase())
                  }
                  className="w-full border px-3 py-2 rounded mb-3 focus:ring-2 focus:ring-sky-500"
                />
                {bordereau && !isOrderNumberValid && (
                  <p className="text-xs text-red-600 -mt-2 mb-3">
                    Format attendu : FR-AAAA-##### (exemple : FR-2025-00638).
                  </p>
                )}

                {/* Transport premium */}
                <div className="flex items-center gap-2 mb-3">
                  <input
                    id="premium-toggle"
                    type="checkbox"
                    checked={isPremium}
                    onChange={(event) => setIsPremium(event.target.checked)}
                    className="h-4 w-4 text-sky-600"
                  />
                  <label
                    htmlFor="premium-toggle"
                    className="text-sm font-medium text-gray-700"
                  >
                    Transport premium
                  </label>
                </div>

                {/* Dates de chargement et livraison */}
                <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
                  <div>
                    <label className="block mb-1 text-sm font-medium text-gray-700">
                      Date de chargement <span className="text-red-600">*</span>
                    </label>
                    <input
                      type="date"
                      value={loadingDate}
                      onChange={(event) => setLoadingDate(event.target.value)}
                      className="w-full border px-3 py-2 rounded focus:ring-2 focus:ring-sky-500"
                    />
                  </div>
                  <div>
                    <label className="block mb-1 text-sm font-medium text-gray-700">
                      Date de livraison <span className="text-red-600">*</span>
                    </label>
                    <input
                      type="date"
                      value={deliveryDate}
                      onChange={(event) => setDeliveryDate(event.target.value)}
                      className="w-full border px-3 py-2 rounded focus:ring-2 focus:ring-sky-500"
                    />
                  </div>
                </div>
                {loadingDate && deliveryDate && !isDeliveryDateValid && (
                  <p className="text-xs text-red-600 -mt-2 mb-3">
                    La date de livraison doit être identique ou postérieure à la date de chargement.
                  </p>
                )}

                {!isPremium && (
                  <div className="mb-4">
                    <label className="block mb-1 text-sm font-medium text-gray-700">
                      Horaire de livraison <span className="text-red-600">*</span>
                    </label>
                    <select
                      value={deliveryTime || "matin"}
                      onChange={(event) => setDeliveryTime(event.target.value)}
                      className="w-full border px-3 py-2 rounded focus:ring-2 focus:ring-sky-500"
                    >
                      <option value="matin">Matin</option>
                      <option value="soir">Soir</option>
                    </select>
                    {!isDeliveryTimeValid && (
                      <p className="text-xs text-red-600 mt-1">Choisissez Matin ou Soir.</p>
                    )}
                  </div>
                )}

                {/* Type de camion */}
                <label className="block mb-2 text-sm font-medium text-gray-700">
                  Type de camion <span className="text-red-600">*</span>
                </label>
                <div className="flex gap-3 mb-4">
                  <label className={`px-3 py-2 border rounded cursor-pointer ${truckType === "non-specifie" ? "bg-sky-50 border-sky-400" : ""}`}>
                    <input
                      type="radio"
                      name="truck"
                      value="non-specifie"
                      checked={truckType === "non-specifie"}
                      onChange={(e) => setTruckType(e.target.value)}
                      className="mr-2"
                    />
                    Non spécifié (choix auto)
                  </label>
                  <label className={`px-3 py-2 border rounded cursor-pointer ${truckType === "bache" ? "bg-sky-50 border-sky-400" : ""}`}>
                    <input
                      type="radio"
                      name="truck"
                      value="bache"
                      checked={truckType === "bache"}
                      onChange={(e) => setTruckType(e.target.value)}
                      className="mr-2"
                    />
                    Baché
                  </label>
                  <label className={`px-3 py-2 border rounded cursor-pointer ${truckType === "plateau" ? "bg-sky-50 border-sky-400" : ""}`}>
                    <input
                      type="radio"
                      name="truck"
                      value="plateau"
                      checked={truckType === "plateau"}
                      onChange={(e) => setTruckType(e.target.value)}
                      className="mr-2"
                    />
                    Plateau
                  </label>
                </div>

                <button
                  onClick={handleSearch}
                  className="w-full bg-sky-600 text-white py-2 rounded hover:bg-sky-700 flex items-center justify-center gap-2 disabled:opacity-60"
                  disabled=
                    {!isOrderNumberValid ||
                      !isLoadingDateValid ||
                      !isDeliveryDateValid ||
                      !isDeliveryTimeValid ||
                      !arePremiumStopTimesValid ||
                      !truckType ||
                      !selectedDepts.length ||
                      isSearching ||
                      isSavingLog}
                >
                  {isSearching ? (
                    "Recherche..."
                  ) : (
                    <>
                      <SearchIcon size={18} /> Rechercher
                    </>
                  )}
                </button>
              </div>

              {/* ======= LISTE DES DÉPARTEMENTS ======= */}
              <div className="md:col-span-2 bg-white rounded-xl shadow-lg p-6">
                <div className="flex items-center justify-between mb-4">
                  <h2 className="text-lg font-semibold">Départements</h2>
                  <button
                    onClick={() => {
                      setSelectedDepts([]);
                      setDeliveryScheduleByStop({});
                    }}
                    className="text-sm text-sky-600 hover:text-sky-800"
                  >
                    Tout décocher
                  </button>
                </div>

                <div className="relative mb-4">
                  <SearchIcon
                    size={16}
                    className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"
                  />
                  <input
                    type="text"
                    value={departmentSearch}
                    onChange={(event) => setDepartmentSearch(event.target.value)}
                    onKeyDown={handleDepartmentSearchKeyDown}
                    placeholder="Rechercher un département (ex: 75)"
                    className="w-full border border-gray-300 rounded-lg py-2 pl-9 pr-3 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400 focus:border-sky-400"
                    autoComplete="off"

                      type="button"
                      onClick={() => setPendingDeleteSearchId(null)}
                      className="rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm text-gray-700 hover:bg-gray-100"
                    >
                      Annuler
                    </button>
                    <button
                      type="button"
                      onClick={() => handleDeleteUnvalidatedSearch(pendingDeleteSearchId)}
                      className="inline-flex items-center gap-2 rounded-lg bg-red-600 px-3 py-2 text-sm font-medium text-white hover:bg-red-700"
                    >
                      <TrashIcon size={14} /> Supprimer
                    </button>
                  </div>
                </div>
              </div>
            )}
          </>
        );
      }

      /********************************************
       *  RENDU FINAL
       ********************************************/
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<TransportOptimizer />);
    </script>
  </body>
</html>
